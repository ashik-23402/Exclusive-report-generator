name: Spring Boot CI

on:
  push:
    branches:
      - develop

  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Workspace
        run: |
          pwd
          ls -R

      - name: Install Java 21 and Maven if Missing
        run: |
          if ! command -v java >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y openjdk-21-jdk
          fi

          if ! command -v mvn >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y maven
          fi

          java -version
          mvn -version

      - name: Clean Project
        run: mvn -f report-generation/pom.xml clean

      - name: Run Tests
        run: mvn -f report-generation/pom.xml test -X

      - name: Build Spring Boot App
        run: mvn -f report-generation/pom.xml package -DskipTests

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: report-generation/target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload Debug Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            *.log
            logs/
          if-no-files-found: ignore

      - name: Cleanup Workspace
        if: always()
        run: rm -rf report-generation/target/tmp
